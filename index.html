<script>
  // Set tweak defaults from localStorage before React mounts so there's no FOUC
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "purple",
    "hero": "full",
    "density": "normal"
  }/*EDITMODE-END*/;
  (function(){
    const html = document.documentElement;
    html.dataset.accent  = localStorage.getItem('ec-accent')  || TWEAK_DEFAULTS.accent;
    html.dataset.hero    = localStorage.getItem('ec-hero')    || TWEAK_DEFAULTS.hero;
    html.dataset.density = localStorage.getItem('ec-density') || TWEAK_DEFAULTS.density;
  })();
</script>

<div id="root"></div>
